      parameters:
      - name: thingTypeName
        in: path
        required: true
        description: The name of the thing type to deprecate.
        schema:
          type: string
          pattern: '[a-zA-Z0-9:_-]+'
          minLength: 1
          maxLength: 128
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                undoDeprecate:
                  description: Whether to undeprecate a deprecated thing type. If <b>true</b>, the thing type will not be deprecated anymore and you can associate it with things.
                  type: boolean
      summary: Amazon IoT Core Deprecate Thing Type
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - Thing Types
