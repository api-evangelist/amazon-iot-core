tags:
- name: Metric Values#thingName&metricName&startTime&endTime
paths:
  /metric-values#thingName&metricName&startTime&endTime:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    get:
      operationId: ListMetricValues
      description: Lists the values reported for an IoT Device Defender metric (device-side metric, cloud-side metric, or custom metric) by the given thing during the specified time period.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMetricValuesResponse'
        '480':
          description: InvalidRequestException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidRequestException'
        '481':
          description: ThrottlingException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThrottlingException'
        '482':
          description: InternalFailureException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalFailureException'
        '483':
          description: ResourceNotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceNotFoundException'
      parameters:
      - name: thingName
        in: query
        required: true
        description: The name of the thing for which security profile metric values are returned.
        schema:
          type: string
          minLength: 1
          maxLength: 128
      - name: metricName
        in: query
        required: true
        description: The name of the security profile metric for which values are returned.
        schema:
          type: string
      - name: dimensionName
        in: query
        required: false
        description: The dimension name.
        schema:
          type: string
          pattern: '[a-zA-Z0-9:_-]+'
          minLength: 1
          maxLength: 128
      - name: dimensionValueOperator
        in: query
        required: false
        description: The dimension value operator.
        schema:
          type: string
          enum:
          - IN
          - NOT_IN
      - name: startTime
        in: query
        required: true
        description: The start of the time period for which metric values are returned.
        schema:
          type: string
          format: date-time
      - name: endTime
        in: query
        required: true
        description: The end of the time period for which metric values are returned.
        schema:
          type: string
          format: date-time
      - name: maxResults
        in: query
        required: false
        description: The maximum number of results to return at one time.
        schema:
          type: integer
          minimum: 1
          maximum: 250
      - name: nextToken
        in: query
        required: false
        description: The token for the next set of results.
        schema:
          type: string
      summary: Amazon IoT Core List Metric Values
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - Metric Values#thingName&metricName&startTime&endTime
components:
  schemas:
    ResourceNotFoundException: {}
    UnsignedLong:
      type: integer
      minimum: 0
    ThrottlingException: {}
    StringList:
      type: array
      items:
        $ref: '#/components/schemas/stringValue'
    InvalidRequestException: {}
    ListMetricValuesResponse:
      type: object
      properties:
        metricDatumList:
          allOf:
          - $ref: '#/components/schemas/MetricDatumList'
          - description: The data the thing reports for the metric during the specified time period.
        nextToken:
          allOf:
          - $ref: '#/components/schemas/NextToken'
          - description: A token that can be used to retrieve the next set of results, or <code>null</code> if there are no additional results.
    Number:
      type: number
      format: double
    InternalFailureException: {}
    NextToken:
      type: string
    NumberList:
      type: array
      items:
        $ref: '#/components/schemas/Number'
    MetricDatum:
      type: object
      properties:
        timestamp:
          allOf:
          - $ref: '#/components/schemas/Timestamp'
          - description: The time the metric value was reported.
        value:
          allOf:
          - $ref: '#/components/schemas/MetricValue'
          - description: The value reported for the metric.
      description: A metric.
    Port:
      type: integer
      minimum: 0
      maximum: 65535
    stringValue:
      type: string
    Cidr:
      type: string
      pattern: '[a-fA-F0-9:\.\/]+'
      minLength: 2
      maxLength: 43
    Ports:
      type: array
      items:
        $ref: '#/components/schemas/Port'
    Timestamp:
      type: string
      format: date-time
    MetricDatumList:
      type: array
      items:
        $ref: '#/components/schemas/MetricDatum'
    Cidrs:
      type: array
      items:
        $ref: '#/components/schemas/Cidr'
    MetricValue:
      type: object
      properties:
        count:
          allOf:
          - $ref: '#/components/schemas/UnsignedLong'
          - description: If the <code>comparisonOperator</code> calls for a numeric value, use this to specify that numeric value to be compared with the <code>metric</code>.
        cidrs:
          allOf:
          - $ref: '#/components/schemas/Cidrs'
          - description: If the <code>comparisonOperator</code> calls for a set of CIDRs, use this to specify that set to be compared with the <code>metric</code>.
        ports:
          allOf:
          - $ref: '#/components/schemas/Ports'
          - description: If the <code>comparisonOperator</code> calls for a set of ports, use this to specify that set to be compared with the <code>metric</code>.
        number:
          allOf:
          - $ref: '#/components/schemas/Number'
          - description: ' The numeral value of a metric. '
        numbers:
          allOf:
          - $ref: '#/components/schemas/NumberList'
          - description: ' The numeral values of a metric. '
        strings:
          allOf:
          - $ref: '#/components/schemas/StringList'
          - description: ' The string values of a metric. '
      description: The value to be compared with the <code>metric</code>.
  parameters:
    X-Amz-Credential:
      name: X-Amz-Credential
      in: header
      schema:
        type: string
      required: false
    X-Amz-Date:
      name: X-Amz-Date
      in: header
      schema:
        type: string
      required: false
    X-Amz-Signature:
      name: X-Amz-Signature
      in: header
      schema:
        type: string
      required: false
    X-Amz-Algorithm:
      name: X-Amz-Algorithm
      in: header
      schema:
        type: string
      required: false
    X-Amz-Security-Token:
      name: X-Amz-Security-Token
      in: header
      schema:
        type: string
      required: false
    X-Amz-SignedHeaders:
      name: X-Amz-SignedHeaders
      in: header
      schema:
        type: string
      required: false
    X-Amz-Content-Sha256:
      name: X-Amz-Content-Sha256
      in: header
      schema:
        type: string
      required: false
  securitySchemes:
    hmac:
      type: apiKey
      name: Authorization
      in: header
      description: Amazon Signature authorization v4
      x-amazon-apigateway-authtype: awsSigv4
