  description: The AWS IoT endpoint for China (Beijing) and China (Ningxia)
security:
- hmac: []
tags:
- name: DomainConfigurations
paths:
  /domainConfigurations/{domainConfigurationName}:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    post:
      operationId: CreateDomainConfiguration
      description: <p>Creates a domain configuration.</p> <p>Requires permission to access the <a href="https://docs.aws.amazon.com/service-authorization/latest/reference/list_awsiot.html#awsiot-actions-as-permissions">CreateDomainConfiguration</a> action.</p>
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateDomainConfigurationResponse'
        '480':
          description: LimitExceededException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LimitExceededException'
        '481':
          description: CertificateValidationException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertificateValidationException'
        '482':
          description: ResourceAlreadyExistsException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceAlreadyExistsException'
        '483':
          description: ServiceUnavailableException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceUnavailableException'
        '484':
          description: InternalFailureException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalFailureException'
        '485':
          description: InvalidRequestException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidRequestException'
        '486':
          description: UnauthorizedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedException'
        '487':
          description: ThrottlingException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThrottlingException'
      parameters:
      - name: domainConfigurationName
        in: path
        required: true
        description: The name of the domain configuration. This value must be unique to a region.
        schema:
          type: string
          pattern: '[\w.-]+'
          minLength: 1
          maxLength: 128
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                domainName:
                  description: The name of the domain.
                  type: string
                  pattern: '[\s\S]*'
                  minLength: 1
                  maxLength: 253
                serverCertificateArns:
                  description: The ARNs of the certificates that IoT passes to the device during the TLS handshake. Currently you can specify only one certificate ARN. This value is not required for Amazon Web Services-managed domains.
                  type: array
                  items:
                    $ref: '#/components/schemas/AcmCertificateArn'
                  minItems: 0
                  maxItems: 1
                validationCertificateArn:
                  description: The certificate used to validate the server certificate and prove domain name ownership. This certificate must be signed by a public certificate authority. This value is not required for Amazon Web Services-managed domains.
                  type: string
                  pattern: arn:aws(-cn|-us-gov|-iso-b|-iso)?:acm:[a-z]{2}-(gov-|iso-|isob-)?[a-z]{4,9}-\d{1}:\d{12}:certificate/[a-zA-Z0-9/-]+
                  minLength: 1
                  maxLength: 2048
                authorizerConfig:
                  description: An object that specifies the authorization service for a domain.
                  type: object
                  properties:
                    defaultAuthorizerName:
                      allOf:
                      - $ref: '#/components/schemas/AuthorizerName'
                      - description: The name of the authorization service for a domain configuration.
                    allowAuthorizerOverride:
                      allOf:
                      - $ref: '#/components/schemas/AllowAuthorizerOverride'
                      - description: A Boolean that specifies whether the domain configuration's authorization service can be overridden.
                serviceType:
                  description: <p>The type of service delivered by the endpoint.</p> <note> <p>Amazon Web Services IoT Core currently supports only the <code>DATA</code> service type.</p> </note>
                  type: string
                  enum:
                  - DATA
                  - CREDENTIAL_PROVIDER
                  - JOBS
                tags:
                  description: '<p>Metadata which can be used to manage the domain configuration.</p> <note> <p>For URI Request parameters use format: ...key1=value1&amp;key2=value2...</p> <p>For the CLI command-line parameter use format: &amp;&amp;tags "key1=value1&amp;key2=value2..."</p> <p>For the cli-input-json file use format: "tags": "key1=value1&amp;key2=value2..."</p> </note>'
                  type: array
                  items:
                    $ref: '#/components/schemas/Tag'
      summary: Amazon IoT Core Create Domain Configuration
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - DomainConfigurations
    delete:
      operationId: DeleteDomainConfiguration
      description: <p>Deletes the specified domain configuration.</p> <p>Requires permission to access the <a href="https://docs.aws.amazon.com/service-authorization/latest/reference/list_awsiot.html#awsiot-actions-as-permissions">DeleteDomainConfiguration</a> action.</p>
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteDomainConfigurationResponse'
        '480':
          description: ResourceNotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceNotFoundException'
        '481':
          description: ThrottlingException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThrottlingException'
        '482':
          description: UnauthorizedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedException'
        '483':
          description: ServiceUnavailableException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceUnavailableException'
        '484':
          description: InternalFailureException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalFailureException'
        '485':
          description: InvalidRequestException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidRequestException'
      parameters:
      - name: domainConfigurationName
        in: path
        required: true
        description: The name of the domain configuration to be deleted.
        schema:
          type: string
          pattern: '[\w.-]+'
          minLength: 1
          maxLength: 128
      summary: Amazon IoT Core Delete Domain Configuration
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - DomainConfigurations
    get:
      operationId: DescribeDomainConfiguration
      description: <p>Gets summary information about a domain configuration.</p> <p>Requires permission to access the <a href="https://docs.aws.amazon.com/service-authorization/latest/reference/list_awsiot.html#awsiot-actions-as-permissions">DescribeDomainConfiguration</a> action.</p>
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescribeDomainConfigurationResponse'
        '480':
          description: ResourceNotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceNotFoundException'
        '481':
          description: ThrottlingException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThrottlingException'
        '482':
          description: InvalidRequestException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidRequestException'
        '483':
          description: UnauthorizedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedException'
        '484':
          description: ServiceUnavailableException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceUnavailableException'
        '485':
          description: InternalFailureException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalFailureException'
      parameters:
      - name: domainConfigurationName
        in: path
        required: true
        description: The name of the domain configuration.
        schema:
          type: string
          pattern: '[\w.:-]+'
          minLength: 1
          maxLength: 128
      summary: Amazon IoT Core Describe Domain Configuration
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - DomainConfigurations
    put:
      operationId: UpdateDomainConfiguration
      description: <p>Updates values stored in the domain configuration. Domain configurations for default endpoints can't be updated.</p> <p>Requires permission to access the <a href="https://docs.aws.amazon.com/service-authorization/latest/reference/list_awsiot.html#awsiot-actions-as-permissions">UpdateDomainConfiguration</a> action.</p>
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateDomainConfigurationResponse'
        '480':
          description: ResourceNotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceNotFoundException'
        '481':
          description: CertificateValidationException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertificateValidationException'
        '482':
          description: InvalidRequestException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidRequestException'
        '483':
          description: ThrottlingException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThrottlingException'
        '484':
          description: UnauthorizedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedException'
        '485':
          description: ServiceUnavailableException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceUnavailableException'
        '486':
          description: InternalFailureException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalFailureException'
      parameters:
      - name: domainConfigurationName
        in: path
        required: true
        description: The name of the domain configuration to be updated.
        schema:
          type: string
          pattern: '[\w.:-]+'
          minLength: 1
          maxLength: 128
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                authorizerConfig:
                  description: An object that specifies the authorization service for a domain.
                  type: object
                  properties:
                    defaultAuthorizerName:
                      allOf:
                      - $ref: '#/components/schemas/AuthorizerName'
                      - description: The name of the authorization service for a domain configuration.
                    allowAuthorizerOverride:
                      allOf:
                      - $ref: '#/components/schemas/AllowAuthorizerOverride'
                      - description: A Boolean that specifies whether the domain configuration's authorization service can be overridden.
                domainConfigurationStatus:
                  description: The status to which the domain configuration should be updated.
                  type: string
                  enum:
                  - ENABLED
                  - DISABLED
                removeAuthorizerConfig:
                  description: Removes the authorization configuration from a domain.
                  type: boolean
      summary: Amazon IoT Core Update Domain Configuration
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - DomainConfigurations
  /domainConfigurations:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    get:
      operationId: ListDomainConfigurations
      description: <p>Gets a list of domain configurations for the user. This list is sorted alphabetically by domain configuration name.</p> <p>Requires permission to access the <a href="https://docs.aws.amazon.com/service-authorization/latest/reference/list_awsiot.html#awsiot-actions-as-permissions">ListDomainConfigurations</a> action.</p>
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDomainConfigurationsResponse'
        '480':
          description: InvalidRequestException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidRequestException'
        '481':
          description: ThrottlingException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThrottlingException'
        '482':
          description: UnauthorizedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedException'
        '483':
          description: ServiceUnavailableException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceUnavailableException'
        '484':
          description: InternalFailureException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalFailureException'
      parameters:
      - name: marker
        in: query
        required: false
        description: The marker for the next set of results.
        schema:
          type: string
          pattern: '[A-Za-z0-9+/]+={0,2}'
          maxLength: 1024
      - name: pageSize
        in: query
        required: false
        description: The result page size.
        schema:
          type: integer
          minimum: 1
          maximum: 250
      - name: serviceType
        in: query
        required: false
        description: The type of service delivered by the endpoint.
        schema:
          type: string
          enum:
          - DATA
          - CREDENTIAL_PROVIDER
          - JOBS
      summary: Amazon IoT Core List Domain Configurations
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - DomainConfigurations
components:
  schemas:
    ResourceNotFoundException: {}
    AuthorizerName:
      type: string
      pattern: '[\w=,@-]+'
      minLength: 1
      maxLength: 128
    CertificateValidationException: {}
    TagKey:
      type: string
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
      minLength: 1
      maxLength: 128
    AcmCertificateArn:
      type: string
      pattern: arn:aws(-cn|-us-gov|-iso-b|-iso)?:acm:[a-z]{2}-(gov-|iso-|isob-)?[a-z]{4,9}-\d{1}:\d{12}:certificate/[a-zA-Z0-9/-]+
      minLength: 1
      maxLength: 2048
    ThrottlingException: {}
    AllowAuthorizerOverride:
      type: boolean
    DateType:
      type: string
      format: date-time
    ListDomainConfigurationsResponse:
      type: object
      properties:
        domainConfigurations:
          allOf:
          - $ref: '#/components/schemas/DomainConfigurations'
          - description: A list of objects that contain summary information about the user's domain configurations.
        nextMarker:
          allOf:
          - $ref: '#/components/schemas/Marker'
          - description: The marker for the next set of results.
    DescribeDomainConfigurationResponse:
      type: object
      properties:
        domainConfigurationName:
          allOf:
          - $ref: '#/components/schemas/ReservedDomainConfigurationName'
          - description: The name of the domain configuration.
        domainConfigurationArn:
          allOf:
          - $ref: '#/components/schemas/DomainConfigurationArn'
          - description: The ARN of the domain configuration.
        domainName:
          allOf:
          - $ref: '#/components/schemas/DomainName'
          - description: The name of the domain.
        serverCertificates:
          allOf:
          - $ref: '#/components/schemas/ServerCertificates'
          - description: A list containing summary information about the server certificate included in the domain configuration.
        authorizerConfig:
          allOf:
          - $ref: '#/components/schemas/AuthorizerConfig'
          - description: An object that specifies the authorization service for a domain.
        domainConfigurationStatus:
          allOf:
          - $ref: '#/components/schemas/DomainConfigurationStatus'
          - description: A Boolean value that specifies the current state of the domain configuration.
        serviceType:
          allOf:
          - $ref: '#/components/schemas/ServiceType'
          - description: The type of service delivered by the endpoint.
        domainType:
          allOf:
          - $ref: '#/components/schemas/DomainType'
          - description: The type of the domain.
        lastStatusChangeDate:
          allOf:
          - $ref: '#/components/schemas/DateType'
          - description: The date and time the domain configuration's status was last changed.
    UpdateDomainConfigurationResponse:
      type: object
      properties:
        domainConfigurationName:
          allOf:
          - $ref: '#/components/schemas/ReservedDomainConfigurationName'
          - description: The name of the domain configuration that was updated.
        domainConfigurationArn:
          allOf:
          - $ref: '#/components/schemas/DomainConfigurationArn'
          - description: The ARN of the domain configuration that was updated.
    InvalidRequestException: {}
    DomainConfigurationName:
      type: string
      pattern: '[\w.-]+'
      minLength: 1
      maxLength: 128
    DomainConfigurationArn:
      type: string
    InternalFailureException: {}
    LimitExceededException: {}
    ServerCertificateSummary:
      type: object
      properties:
        serverCertificateArn:
          allOf:
          - $ref: '#/components/schemas/AcmCertificateArn'
          - description: The ARN of the server certificate.
        serverCertificateStatus:
          allOf:
          - $ref: '#/components/schemas/ServerCertificateStatus'
          - description: The status of the server certificate.
        serverCertificateStatusDetail:
          allOf:
          - $ref: '#/components/schemas/ServerCertificateStatusDetail'
          - description: Details that explain the status of the server certificate.
      description: An object that contains information about a server certificate.
    DeleteDomainConfigurationResponse:
      type: object
      properties: {}
    DomainType:
      type: string
      enum:
      - ENDPOINT
      - AWS_MANAGED
      - CUSTOMER_MANAGED
    AuthorizerConfig:
      type: object
      properties:
        defaultAuthorizerName:
          allOf:
          - $ref: '#/components/schemas/AuthorizerName'
          - description: The name of the authorization service for a domain configuration.
        allowAuthorizerOverride:
          allOf:
          - $ref: '#/components/schemas/AllowAuthorizerOverride'
          - description: A Boolean that specifies whether the domain configuration's authorization service can be overridden.
      description: An object that specifies the authorization service for a domain.
    DomainName:
      type: string
      pattern: '[\s\S]*'
      minLength: 1
      maxLength: 253
    Tag:
      type: object
      required:
      - Key
      properties:
        Key:
          allOf:
          - $ref: '#/components/schemas/TagKey'
          - description: The tag's key.
        Value:
          allOf:
          - $ref: '#/components/schemas/TagValue'
          - description: The tag's value.
      description: A set of key/value pairs that are used to manage the resource.
    CreateDomainConfigurationResponse:
      type: object
      properties:
        domainConfigurationName:
          allOf:
          - $ref: '#/components/schemas/DomainConfigurationName'
          - description: The name of the domain configuration.
        domainConfigurationArn:
          allOf:
          - $ref: '#/components/schemas/DomainConfigurationArn'
          - description: The ARN of the domain configuration.
    ResourceAlreadyExistsException: {}
    DomainConfigurations:
      type: array
      items:
        $ref: '#/components/schemas/DomainConfigurationSummary'
    ServiceUnavailableException: {}
    UnauthorizedException: {}
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
    ServerCertificateStatusDetail:
      type: string
    DomainConfigurationStatus:
      type: string
      enum:
      - ENABLED
      - DISABLED
    ServerCertificates:
      type: array
      items:
        $ref: '#/components/schemas/ServerCertificateSummary'
    DomainConfigurationSummary:
      type: object
      properties:
        domainConfigurationName:
          allOf:
          - $ref: '#/components/schemas/ReservedDomainConfigurationName'
          - description: The name of the domain configuration. This value must be unique to a region.
        domainConfigurationArn:
          allOf:
          - $ref: '#/components/schemas/DomainConfigurationArn'
          - description: The ARN of the domain configuration.
        serviceType:
          allOf:
          - $ref: '#/components/schemas/ServiceType'
          - description: The type of service delivered by the endpoint.
      description: <p>The summary of a domain configuration. A domain configuration specifies custom IoT-specific information about a domain. A domain configuration can be associated with an Amazon Web Services-managed domain (for example, dbc123defghijk.iot.us-west-2.amazonaws.com), a customer managed domain, or a default endpoint.</p> <ul> <li> <p>Data</p> </li> <li> <p>Jobs</p> </li> <li> <p>CredentialProvider</p> </li> </ul>
    Marker:
      type: string
      pattern: '[A-Za-z0-9+/]+={0,2}'
      maxLength: 1024
    ReservedDomainConfigurationName:
      type: string
      pattern: '[\w.:-]+'
      minLength: 1
      maxLength: 128
    ServerCertificateStatus:
      type: string
      enum:
      - INVALID
      - VALID
    ServiceType:
      type: string
      enum:
      - DATA
      - CREDENTIAL_PROVIDER
      - JOBS
  parameters:
    X-Amz-Credential:
      name: X-Amz-Credential
      in: header
      schema:
        type: string
