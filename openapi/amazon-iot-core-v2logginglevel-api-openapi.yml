security:
- hmac: []
tags:
- name: V2LoggingLevel
paths:
  /v2LoggingLevel:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    get:
      operationId: ListV2LoggingLevels
      description: <p>Lists logging levels.</p> <p>Requires permission to access the <a href="https://docs.aws.amazon.com/service-authorization/latest/reference/list_awsiot.html#awsiot-actions-as-permissions">ListV2LoggingLevels</a> action.</p>
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListV2LoggingLevelsResponse'
        '480':
          description: InternalException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalException'
        '481':
          description: NotConfiguredException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotConfiguredException'
        '482':
          description: InvalidRequestException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidRequestException'
        '483':
          description: ServiceUnavailableException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceUnavailableException'
      parameters:
      - name: targetType
        in: query
        required: false
        description: The type of resource for which you are configuring logging. Must be <code>THING_Group</code>.
        schema:
          type: string
          enum:
          - DEFAULT
          - THING_GROUP
          - CLIENT_ID
          - SOURCE_IP
          - PRINCIPAL_ID
      - name: nextToken
        in: query
        required: false
        description: To retrieve the next set of results, the <code>nextToken</code> value from a previous response; otherwise <b>null</b> to receive the first set of results.
        schema:
          type: string
      - name: maxResults
        in: query
        required: false
        description: The maximum number of results to return at one time.
        schema:
          type: integer
          minimum: 1
          maximum: 250
      summary: Amazon IoT Core List V2 Logging Levels
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - V2LoggingLevel
    post:
      operationId: SetV2LoggingLevel
      description: <p>Sets the logging level.</p> <p>Requires permission to access the <a href="https://docs.aws.amazon.com/service-authorization/latest/reference/list_awsiot.html#awsiot-actions-as-permissions">SetV2LoggingLevel</a> action.</p>
      responses:
        '200':
          description: Success
        '480':
          description: InternalException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalException'
        '481':
          description: NotConfiguredException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotConfiguredException'
        '482':
          description: InvalidRequestException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidRequestException'
        '483':
          description: ServiceUnavailableException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceUnavailableException'
        '484':
          description: LimitExceededException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LimitExceededException'
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - logTarget
              - logLevel
              properties:
                logTarget:
                  description: A log target.
                  type: object
                  properties:
                    targetType:
                      allOf:
                      - $ref: '#/components/schemas/LogTargetType'
                      - description: The target type.
                    targetName:
                      allOf:
                      - $ref: '#/components/schemas/LogTargetName'
                      - description: The target name.
                logLevel:
                  description: The log level.
                  type: string
                  enum:
                  - DEBUG
                  - INFO
                  - ERROR
                  - WARN
                  - DISABLED
      summary: Amazon IoT Core Set V2 Logging Level
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - V2LoggingLevel
components:
  schemas:
    InternalException: {}
    NotConfiguredException: {}
    InvalidRequestException: {}
    LogTargetName:
      type: string
    LimitExceededException: {}
    ListV2LoggingLevelsResponse:
      type: object
      properties:
        logTargetConfigurations:
          allOf:
          - $ref: '#/components/schemas/LogTargetConfigurations'
          - description: The logging configuration for a target.
        nextToken:
          allOf:
          - $ref: '#/components/schemas/NextToken'
          - description: The token to use to get the next set of results, or <b>null</b> if there are no additional results.
    NextToken:
      type: string
    LogTarget:
      type: object
      required:
      - targetType
      properties:
        targetType:
          allOf:
          - $ref: '#/components/schemas/LogTargetType'
          - description: The target type.
        targetName:
          allOf:
          - $ref: '#/components/schemas/LogTargetName'
          - description: The target name.
      description: A log target.
    LogTargetConfigurations:
      type: array
      items:
        $ref: '#/components/schemas/LogTargetConfiguration'
    LogTargetConfiguration:
      type: object
      properties:
        logTarget:
          allOf:
          - $ref: '#/components/schemas/LogTarget'
          - description: A log target
        logLevel:
          allOf:
          - $ref: '#/components/schemas/LogLevel'
          - description: The logging level.
      description: The target configuration.
    ServiceUnavailableException: {}
    LogTargetType:
      type: string
      enum:
      - DEFAULT
      - THING_GROUP
      - CLIENT_ID
      - SOURCE_IP
      - PRINCIPAL_ID
    LogLevel:
      type: string
      enum:
      - DEBUG
      - INFO
      - ERROR
      - WARN
      - DISABLED
  parameters:
    X-Amz-Credential:
      name: X-Amz-Credential
      in: header
      schema:
        type: string
      required: false
    X-Amz-Date:
      name: X-Amz-Date
      in: header
      schema:
        type: string
      required: false
    X-Amz-Signature:
      name: X-Amz-Signature
      in: header
      schema:
        type: string
      required: false
    X-Amz-Algorithm:
      name: X-Amz-Algorithm
      in: header
      schema:
        type: string
      required: false
    X-Amz-Security-Token:
      name: X-Amz-Security-Token
      in: header
      schema:
        type: string
      required: false
    X-Amz-SignedHeaders:
      name: X-Amz-SignedHeaders
      in: header
      schema:
        type: string
      required: false
    X-Amz-Content-Sha256:
      name: X-Amz-Content-Sha256
      in: header
      schema:
        type: string
      required: false
  securitySchemes:
    hmac:
      type: apiKey
      name: Authorization
      in: header
      description: Amazon Signature authorization v4
      x-amazon-apigateway-authtype: awsSigv4
