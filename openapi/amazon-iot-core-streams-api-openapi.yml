        '484':
          description: InternalFailureException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalFailureException'
      parameters:
      - name: maxResults
        in: query
        required: false
        description: The maximum number of results to return at a time.
        schema:
          type: integer
          minimum: 1
          maximum: 250
      - name: nextToken
        in: query
        required: false
        description: A token used to get the next set of results.
        schema:
          type: string
      - name: isAscendingOrder
        in: query
        required: false
        description: Set to true to return the list of streams in ascending order.
        schema:
          type: boolean
      summary: Amazon IoT Core List Streams
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - Streams
components:
  schemas:
    ResourceNotFoundException: {}
    TagKey:
      type: string
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
      minLength: 1
      maxLength: 128
    ListStreamsResponse:
      type: object
      properties:
        streams:
          allOf:
          - $ref: '#/components/schemas/StreamsSummary'
          - description: A list of streams.
        nextToken:
          allOf:
          - $ref: '#/components/schemas/NextToken'
          - description: A token used to get the next set of results.
    ThrottlingException: {}
    UpdateStreamResponse:
      type: object
      properties:
        streamId:
          allOf:
          - $ref: '#/components/schemas/StreamId'
          - description: The stream ID.
        streamArn:
          allOf:
          - $ref: '#/components/schemas/StreamArn'
          - description: The stream ARN.
        description:
          allOf:
          - $ref: '#/components/schemas/StreamDescription'
          - description: A description of the stream.
        streamVersion:
          allOf:
          - $ref: '#/components/schemas/StreamVersion'
          - description: The stream version.
    DateType:
      type: string
      format: date-time
    InvalidRequestException: {}
    StreamInfo:
      type: object
      properties:
        streamId:
          allOf:
          - $ref: '#/components/schemas/StreamId'
          - description: The stream ID.
        streamArn:
          allOf:
          - $ref: '#/components/schemas/StreamArn'
          - description: The stream ARN.
        streamVersion:
          allOf:
          - $ref: '#/components/schemas/StreamVersion'
          - description: The stream version.
        description:
          allOf:
          - $ref: '#/components/schemas/StreamDescription'
          - description: The description of the stream.
        files:
          allOf:
          - $ref: '#/components/schemas/StreamFiles'
          - description: The files to stream.
        createdAt:
          allOf:
          - $ref: '#/components/schemas/DateType'
          - description: The date when the stream was created.
        lastUpdatedAt:
          allOf:
          - $ref: '#/components/schemas/DateType'
          - description: The date when the stream was last updated.
        roleArn:
          allOf:
          - $ref: '#/components/schemas/RoleArn'
          - description: An IAM role IoT assumes to access your S3 files.
      description: Information about a stream.
    InternalFailureException: {}
    LimitExceededException: {}
    DeleteStreamResponse:
      type: object
      properties: {}
    NextToken:
      type: string
    CreateStreamResponse:
      type: object
      properties:
        streamId:
          allOf:
          - $ref: '#/components/schemas/StreamId'
          - description: The stream ID.
        streamArn:
          allOf:
          - $ref: '#/components/schemas/StreamArn'
          - description: The stream ARN.
        description:
          allOf:
          - $ref: '#/components/schemas/StreamDescription'
          - description: A description of the stream.
        streamVersion:
          allOf:
          - $ref: '#/components/schemas/StreamVersion'
          - description: The version of the stream.
    StreamDescription:
      type: string
      pattern: '[^\p{C}]+'
      maxLength: 2028
    StreamFile:
      type: object
      properties:
        fileId:
          allOf:
          - $ref: '#/components/schemas/FileId'
          - description: The file ID.
        s3Location:
          allOf:
          - $ref: '#/components/schemas/S3Location'
          - description: The location of the file in S3.
      description: Represents a file to stream.
    DescribeStreamResponse:
      type: object
      properties:
        streamInfo:
          allOf:
          - $ref: '#/components/schemas/StreamInfo'
          - description: Information about the stream.
    S3Version:
      type: string
    RoleArn:
      type: string
      minLength: 20
      maxLength: 2048
    Tag:
      type: object
      required:
      - Key
      properties:
        Key:
          allOf:
          - $ref: '#/components/schemas/TagKey'
          - description: The tag's key.
        Value:
          allOf:
          - $ref: '#/components/schemas/TagValue'
          - description: The tag's value.
      description: A set of key/value pairs that are used to manage the resource.
    FileId:
      type: integer
      minimum: 0
      maximum: 255
    StreamsSummary:
      type: array
      items:
        $ref: '#/components/schemas/StreamSummary'
    ResourceAlreadyExistsException: {}
    StreamSummary:
      type: object
      properties:
        streamId:
          allOf:
          - $ref: '#/components/schemas/StreamId'
          - description: The stream ID.
        streamArn:
          allOf:
          - $ref: '#/components/schemas/StreamArn'
          - description: The stream ARN.
        streamVersion:
          allOf:
          - $ref: '#/components/schemas/StreamVersion'
          - description: The stream version.
        description:
          allOf:
          - $ref: '#/components/schemas/StreamDescription'
          - description: A description of the stream.
      description: A summary of a stream.
    ServiceUnavailableException: {}
    UnauthorizedException: {}
    S3Key:
      type: string
      minLength: 1
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
    StreamVersion:
      type: integer
      minimum: 0
      maximum: 65535
    DeleteConflictException: {}
    StreamFiles:
      type: array
      items:
        $ref: '#/components/schemas/StreamFile'
      minItems: 1
      maxItems: 50
    StreamId:
      type: string
      pattern: '[a-zA-Z0-9_-]+'
      minLength: 1
      maxLength: 128
    S3Bucket:
      type: string
      minLength: 1
    StreamArn:
      type: string
    S3Location:
      type: object
      properties:
        bucket:
          allOf:
          - $ref: '#/components/schemas/S3Bucket'
          - description: The S3 bucket.
        key:
          allOf:
          - $ref: '#/components/schemas/S3Key'
          - description: The S3 key.
        version:
          allOf:
          - $ref: '#/components/schemas/S3Version'
          - description: The S3 bucket version.
      description: The S3 location.
  parameters:
    X-Amz-Credential:
      name: X-Amz-Credential
      in: header
      schema:
        type: string
      required: false
    X-Amz-Date:
      name: X-Amz-Date
      in: header
      schema:
        type: string
      required: false
    X-Amz-Signature:
      name: X-Amz-Signature
      in: header
      schema:
        type: string
      required: false
    X-Amz-Algorithm:
      name: X-Amz-Algorithm
      in: header
      schema:
        type: string
      required: false
    X-Amz-Security-Token:
      name: X-Amz-Security-Token
      in: header
      schema:
        type: string
      required: false
    X-Amz-SignedHeaders:
      name: X-Amz-SignedHeaders
      in: header
      schema:
        type: string
      required: false
    X-Amz-Content-Sha256:
      name: X-Amz-Content-Sha256
      in: header
      schema:
        type: string
      required: false
  securitySchemes:
    hmac:
      type: apiKey
      name: Authorization
      in: header
      description: Amazon Signature authorization v4
      x-amazon-apigateway-authtype: awsSigv4
