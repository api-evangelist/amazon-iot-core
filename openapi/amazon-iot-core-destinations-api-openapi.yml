security:
- hmac: []
tags:
- name: Destinations
paths:
  /destinations:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    post:
      operationId: CreateTopicRuleDestination
      description: <p>Creates a topic rule destination. The destination must be confirmed prior to use.</p> <p>Requires permission to access the <a href="https://docs.aws.amazon.com/service-authorization/latest/reference/list_awsiot.html#awsiot-actions-as-permissions">CreateTopicRuleDestination</a> action.</p>
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTopicRuleDestinationResponse'
        '480':
          description: InternalException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalException'
        '481':
          description: InvalidRequestException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidRequestException'
        '482':
          description: ResourceAlreadyExistsException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceAlreadyExistsException'
        '483':
          description: ServiceUnavailableException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceUnavailableException'
        '484':
          description: ConflictingResourceUpdateException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictingResourceUpdateException'
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - destinationConfiguration
              properties:
                destinationConfiguration:
                  description: Configuration of the topic rule destination.
                  type: object
                  properties:
                    httpUrlConfiguration:
                      allOf:
                      - $ref: '#/components/schemas/HttpUrlDestinationConfiguration'
                      - description: Configuration of the HTTP URL.
                    vpcConfiguration:
                      allOf:
                      - $ref: '#/components/schemas/VpcDestinationConfiguration'
                      - description: Configuration of the virtual private cloud (VPC) connection.
      summary: Amazon IoT Core Create Topic Rule Destination
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - Destinations
    get:
      operationId: ListTopicRuleDestinations
      description: <p>Lists all the topic rule destinations in your Amazon Web Services account.</p> <p>Requires permission to access the <a href="https://docs.aws.amazon.com/service-authorization/latest/reference/list_awsiot.html#awsiot-actions-as-permissions">ListTopicRuleDestinations</a> action.</p>
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListTopicRuleDestinationsResponse'
        '480':
          description: InternalException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalException'
        '481':
          description: InvalidRequestException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidRequestException'
        '482':
          description: ServiceUnavailableException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceUnavailableException'
        '483':
          description: UnauthorizedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedException'
      parameters:
      - name: maxResults
        in: query
        required: false
        description: The maximum number of results to return at one time.
        schema:
          type: integer
          minimum: 1
          maximum: 1000
      - name: nextToken
        in: query
        required: false
        description: To retrieve the next set of results, the <code>nextToken</code> value from a previous response; otherwise <b>null</b> to receive the first set of results.
        schema:
          type: string
      summary: Amazon IoT Core List Topic Rule Destinations
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - Destinations
    patch:
      operationId: UpdateTopicRuleDestination
      description: <p>Updates a topic rule destination. You use this to change the status, endpoint URL, or confirmation URL of the destination.</p> <p>Requires permission to access the <a href="https://docs.aws.amazon.com/service-authorization/latest/reference/list_awsiot.html#awsiot-actions-as-permissions">UpdateTopicRuleDestination</a> action.</p>
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateTopicRuleDestinationResponse'
        '480':
          description: InternalException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalException'
        '481':
          description: InvalidRequestException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidRequestException'
        '482':
          description: ServiceUnavailableException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceUnavailableException'
        '483':
          description: UnauthorizedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedException'
        '484':
          description: ConflictingResourceUpdateException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictingResourceUpdateException'
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - arn
              - status
              properties:
                arn:
                  description: The ARN of the topic rule destination.
                  type: string
                status:
                  description: <p>The status of the topic rule destination. Valid values are:</p> <dl> <dt>IN_PROGRESS</dt> <dd> <p>A topic rule destination was created but has not been confirmed. You can set <code>status</code> to <code>IN_PROGRESS</code> by calling <code>UpdateTopicRuleDestination</code>. Calling <code>UpdateTopicRuleDestination</code> causes a new confirmation challenge to be sent to your confirmation endpoint.</p> </dd> <dt>ENABLED</dt> <dd> <p>Confirmation was completed, and traffic to this destination is allowed. You can set <code>status</code> to <code>DISABLED</code> by calling <code>UpdateTopicRuleDestination</code>.</p> </dd> <dt>DISABLED</dt> <dd> <p>Confirmation was completed, and traffic to this destination is not allowed. You can set <code>status</code> to <code>ENABLED</code> by calling <code>UpdateTopicRuleDestination</code>.</p> </dd> <dt>ERROR</dt> <dd> <p>Confirmation could not be completed, for example if the confirmation timed out. You can call <code>GetTopicRuleDestination</code> for details about the error. You can set <code>status</code> to <code>IN_PROGRESS</code> by calling <code>UpdateTopicRuleDestination</code>. Calling <code>UpdateTopicRuleDestination</code> causes a new confirmation challenge to be sent to your confirmation endpoint.</p> </dd> </dl>
                  type: string
                  enum:
                  - ENABLED
                  - IN_PROGRESS
                  - DISABLED
                  - ERROR
                  - DELETING
      summary: Amazon IoT Core Update Topic Rule Destination
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - Destinations
  /destinations/{arn}:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    delete:
      operationId: DeleteTopicRuleDestination
      description: <p>Deletes a topic rule destination.</p> <p>Requires permission to access the <a href="https://docs.aws.amazon.com/service-authorization/latest/reference/list_awsiot.html#awsiot-actions-as-permissions">DeleteTopicRuleDestination</a> action.</p>
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteTopicRuleDestinationResponse'
        '480':
          description: InternalException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalException'
        '481':
          description: InvalidRequestException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidRequestException'
        '482':
          description: ServiceUnavailableException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceUnavailableException'
        '483':
          description: UnauthorizedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedException'
        '484':
          description: ConflictingResourceUpdateException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictingResourceUpdateException'
      parameters:
      - name: arn
        in: path
        required: true
        description: The ARN of the topic rule destination to delete.
        schema:
          type: string
      summary: Amazon IoT Core Delete Topic Rule Destination
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - Destinations
    get:
      operationId: GetTopicRuleDestination
      description: <p>Gets information about a topic rule destination.</p> <p>Requires permission to access the <a href="https://docs.aws.amazon.com/service-authorization/latest/reference/list_awsiot.html#awsiot-actions-as-permissions">GetTopicRuleDestination</a> action.</p>
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetTopicRuleDestinationResponse'
        '480':
          description: InternalException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalException'
        '481':
          description: InvalidRequestException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidRequestException'
        '482':
          description: ServiceUnavailableException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceUnavailableException'
        '483':
          description: UnauthorizedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedException'
      parameters:
      - name: arn
        in: path
        required: true
        description: The ARN of the topic rule destination.
        schema:
          type: string
      summary: Amazon IoT Core Get Topic Rule Destination
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - Destinations
components:
  schemas:
    VpcDestinationProperties:
      type: object
      properties:
        subnetIds:
          allOf:
          - $ref: '#/components/schemas/SubnetIdList'
          - description: The subnet IDs of the VPC destination.
        securityGroups:
          allOf:
          - $ref: '#/components/schemas/SecurityGroupList'
          - description: The security groups of the VPC destination.
        vpcId:
          allOf:
          - $ref: '#/components/schemas/VpcId'
          - description: The ID of the VPC.
        roleArn:
          allOf:
          - $ref: '#/components/schemas/AwsArn'
          - description: The ARN of a role that has permission to create and attach to elastic network interfaces (ENIs).
      description: The properties of a virtual private cloud (VPC) destination.
    SubnetId:
      type: string
    InternalException: {}
    InvalidRequestException: {}
    VpcDestinationSummary:
      type: object
      properties:
        subnetIds:
          allOf:
          - $ref: '#/components/schemas/SubnetIdList'
          - description: The subnet IDs of the VPC destination.
        securityGroups:
          allOf:
          - $ref: '#/components/schemas/SecurityGroupList'
          - description: The security groups of the VPC destination.
        vpcId:
          allOf:
          - $ref: '#/components/schemas/VpcId'
          - description: The ID of the VPC.
        roleArn:
          allOf:
          - $ref: '#/components/schemas/AwsArn'
          - description: The ARN of a role that has permission to create and attach to elastic network interfaces (ENIs).
      description: The summary of a virtual private cloud (VPC) destination.
    HttpUrlDestinationConfiguration:
      type: object
      required:
      - confirmationUrl
      properties:
        confirmationUrl:
          allOf:
          - $ref: '#/components/schemas/Url'
          - description: The URL IoT uses to confirm ownership of or access to the topic rule destination URL.
      description: HTTP URL destination configuration used by the topic rule's HTTP action.
    LastUpdatedAtDate:
      type: string
      format: date-time
    AwsArn:
      type: string
    NextToken:
      type: string
    CreatedAtDate:
      type: string
      format: date-time
    TopicRuleDestination:
      type: object
      properties:
        arn:
          allOf:
          - $ref: '#/components/schemas/AwsArn'
          - description: The topic rule destination URL.
        status:
          allOf:
          - $ref: '#/components/schemas/TopicRuleDestinationStatus'
          - description: <p>The status of the topic rule destination. Valid values are:</p> <dl> <dt>IN_PROGRESS</dt> <dd> <p>A topic rule destination was created but has not been confirmed. You can set <code>status</code> to <code>IN_PROGRESS</code> by calling <code>UpdateTopicRuleDestination</code>. Calling <code>UpdateTopicRuleDestination</code> causes a new confirmation challenge to be sent to your confirmation endpoint.</p> </dd> <dt>ENABLED</dt> <dd> <p>Confirmation was completed, and traffic to this destination is allowed. You can set <code>status</code> to <code>DISABLED</code> by calling <code>UpdateTopicRuleDestination</code>.</p> </dd> <dt>DISABLED</dt> <dd> <p>Confirmation was completed, and traffic to this destination is not allowed. You can set <code>status</code> to <code>ENABLED</code> by calling <code>UpdateTopicRuleDestination</code>.</p> </dd> <dt>ERROR</dt> <dd> <p>Confirmation could not be completed, for example if the confirmation timed out. You can call <code>GetTopicRuleDestination</code> for details about the error. You can set <code>status</code> to <code>IN_PROGRESS</code> by calling <code>UpdateTopicRuleDestination</code>. Calling <code>UpdateTopicRuleDestination</code> causes a new confirmation challenge to be sent to your confirmation endpoint.</p> </dd> </dl>
        createdAt:
          allOf:
          - $ref: '#/components/schemas/CreatedAtDate'
          - description: The date and time when the topic rule destination was created.
        lastUpdatedAt:
          allOf:
          - $ref: '#/components/schemas/LastUpdatedAtDate'
          - description: The date and time when the topic rule destination was last updated.
        statusReason:
          allOf:
          - $ref: '#/components/schemas/String'
          - description: Additional details or reason why the topic rule destination is in the current status.
        httpUrlProperties:
          allOf:
          - $ref: '#/components/schemas/HttpUrlDestinationProperties'
          - description: Properties of the HTTP URL.
        vpcProperties:
          allOf:
          - $ref: '#/components/schemas/VpcDestinationProperties'
          - description: Properties of the virtual private cloud (VPC) connection.
      description: A topic rule destination.
    VpcDestinationConfiguration:
      type: object
      required:
      - subnetIds
      - vpcId
      - roleArn
      properties:
        subnetIds:
          allOf:
          - $ref: '#/components/schemas/SubnetIdList'
          - description: The subnet IDs of the VPC destination.
        securityGroups:
          allOf:
          - $ref: '#/components/schemas/SecurityGroupList'
          - description: The security groups of the VPC destination.
        vpcId:
          allOf:
          - $ref: '#/components/schemas/VpcId'
          - description: The ID of the VPC.
        roleArn:
          allOf:
          - $ref: '#/components/schemas/AwsArn'
          - description: The ARN of a role that has permission to create and attach to elastic network interfaces (ENIs).
      description: The configuration information for a virtual private cloud (VPC) destination.
    SecurityGroupList:
      type: array
      items:
        $ref: '#/components/schemas/SecurityGroupId'
    String:
      type: string
    SecurityGroupId:
      type: string
    GetTopicRuleDestinationResponse:
      type: object
      properties:
        topicRuleDestination:
          allOf:
          - $ref: '#/components/schemas/TopicRuleDestination'
          - description: The topic rule destination.
    HttpUrlDestinationSummary:
      type: object
      properties:
        confirmationUrl:
          allOf:
          - $ref: '#/components/schemas/Url'
          - description: The URL used to confirm ownership of or access to the HTTP topic rule destination URL.
      description: Information about an HTTP URL destination.
    TopicRuleDestinationSummaries:
      type: array
      items:
        $ref: '#/components/schemas/TopicRuleDestinationSummary'
    ResourceAlreadyExistsException: {}
    HttpUrlDestinationProperties:
      type: object
      properties:
        confirmationUrl:
          allOf:
          - $ref: '#/components/schemas/Url'
          - description: The URL used to confirm the HTTP topic rule destination URL.
      description: HTTP URL destination properties.
    ServiceUnavailableException: {}
    UnauthorizedException: {}
    ConflictingResourceUpdateException: {}
    DeleteTopicRuleDestinationResponse:
      type: object
      properties: {}
    TopicRuleDestinationStatus:
      type: string
      enum:
      - ENABLED
      - IN_PROGRESS
      - DISABLED
      - ERROR
      - DELETING
    CreateTopicRuleDestinationResponse:
      type: object
      properties:
        topicRuleDestination:
          allOf:
          - $ref: '#/components/schemas/TopicRuleDestination'
          - description: The topic rule destination.
    SubnetIdList:
      type: array
      items:
        $ref: '#/components/schemas/SubnetId'
    ListTopicRuleDestinationsResponse:
      type: object
      properties:
        destinationSummaries:
          allOf:
          - $ref: '#/components/schemas/TopicRuleDestinationSummaries'
          - description: Information about a topic rule destination.
        nextToken:
          allOf:
          - $ref: '#/components/schemas/NextToken'
          - description: The token to use to get the next set of results, or <b>null</b> if there are no additional results.
    Url:
      type: string
      maxLength: 2000
    VpcId:
      type: string
    UpdateTopicRuleDestinationResponse:
      type: object
      properties: {}
    TopicRuleDestinationSummary:
      type: object
      properties:
        arn:
          allOf:
          - $ref: '#/components/schemas/AwsArn'
          - description: The topic rule destination ARN.
        status:
          allOf:
          - $ref: '#/components/schemas/TopicRuleDestinationStatus'
          - description: <p>The status of the topic rule destination. Valid values are:</p> <dl> <dt>IN_PROGRESS</dt> <dd> <p>A topic rule destination was created but has not been confirmed. You can set <code>status</code> to <code>IN_PROGRESS</code> by calling <code>UpdateTopicRuleDestination</code>. Calling <code>UpdateTopicRuleDestination</code> causes a new confirmation challenge to be sent to your confirmation endpoint.</p> </dd> <dt>ENABLED</dt> <dd> <p>Confirmation was completed, and traffic to this destination is allowed. You can set <code>status</code> to <code>DISABLED</code> by calling <code>UpdateTopicRuleDestination</code>.</p> </dd> <dt>DISABLED</dt> <dd> <p>Confirmation was completed, and traffic to this destination is not allowed. You can set <code>status</code> to <code>ENABLED</code> by calling <code>UpdateTopicRuleDestination</code>.</p> </dd> <dt>ERROR</dt> <dd> <p>Confirmation could not be completed, for example if the confirmation timed out. You can call <code>GetTopicRuleDestination</code> for details about the error. You can set <code>status</code> to <code>IN_PROGRESS</code> by calling <code>UpdateTopicRuleDestination</code>. Calling <code>UpdateTopicRuleDestination</code> causes a new confirmation challenge to be sent to your confirmation endpoint.</p> </dd> </dl>
        createdAt:
          allOf:
          - $ref: '#/components/schemas/CreatedAtDate'
          - description: The date and time when the topic rule destination was created.
        lastUpdatedAt:
          allOf:
          - $ref: '#/components/schemas/LastUpdatedAtDate'
          - description: The date and time when the topic rule destination was last updated.
        statusReason:
          allOf:
          - $ref: '#/components/schemas/String'
          - description: The reason the topic rule destination is in the current status.
        httpUrlSummary:
          allOf:
          - $ref: '#/components/schemas/HttpUrlDestinationSummary'
          - description: Information about the HTTP URL.
        vpcDestinationSummary:
          allOf:
          - $ref: '#/components/schemas/VpcDestinationSummary'
          - description: Information about the virtual private cloud (VPC) connection.
      description: Information about the topic rule destination.
  parameters:
    X-Amz-Credential:
      name: X-Amz-Credential
      in: header
      schema:
        type: string
      required: false
    X-Amz-Date:
      name: X-Amz-Date
      in: header
      schema:
        type: string
      required: false
    X-Amz-Content-Sha256:
      name: X-Amz-Content-Sha256
      in: header
      schema:
        type: string
      required: false
    X-Amz-Signature:
