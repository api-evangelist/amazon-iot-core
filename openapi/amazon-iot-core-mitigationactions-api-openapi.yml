security:
- hmac: []
tags:
- name: Mitigationactions
paths:
  /mitigationactions/actions/{actionName}:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    post:
      operationId: CreateMitigationAction
      description: <p>Defines an action that can be applied to audit findings by using StartAuditMitigationActionsTask. Only certain types of mitigation actions can be applied to specific check names. For more information, see <a href="https://docs.aws.amazon.com/iot/latest/developerguide/device-defender-mitigation-actions.html">Mitigation actions</a>. Each mitigation action can apply only one type of change.</p> <p>Requires permission to access the <a href="https://docs.aws.amazon.com/service-authorization/latest/reference/list_awsiot.html#awsiot-actions-as-permissions">CreateMitigationAction</a> action.</p>
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateMitigationActionResponse'
        '480':
          description: InvalidRequestException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidRequestException'
        '481':
          description: ResourceAlreadyExistsException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceAlreadyExistsException'
        '482':
          description: LimitExceededException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LimitExceededException'
        '483':
          description: ThrottlingException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThrottlingException'
        '484':
          description: InternalFailureException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalFailureException'
      parameters:
      - name: actionName
        in: path
        required: true
        description: A friendly name for the action. Choose a friendly name that accurately describes the action (for example, <code>EnableLoggingAction</code>).
        schema:
          type: string
          pattern: '[a-zA-Z0-9_-]+'
          maxLength: 128
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - roleArn
              - actionParams
              properties:
                roleArn:
                  description: The ARN of the IAM role that is used to apply the mitigation action.
                  type: string
                  minLength: 20
                  maxLength: 2048
                actionParams:
                  description: The set of parameters for this mitigation action. You can specify only one type of parameter (in other words, you can apply only one action for each defined mitigation action).
                  type: object
                  properties:
                    updateDeviceCertificateParams:
                      allOf:
                      - $ref: '#/components/schemas/UpdateDeviceCertificateParams'
                      - description: Parameters to define a mitigation action that changes the state of the device certificate to inactive.
                    updateCACertificateParams:
                      allOf:
                      - $ref: '#/components/schemas/UpdateCACertificateParams'
                      - description: Parameters to define a mitigation action that changes the state of the CA certificate to inactive.
                    addThingsToThingGroupParams:
                      allOf:
                      - $ref: '#/components/schemas/AddThingsToThingGroupParams'
                      - description: Parameters to define a mitigation action that moves devices associated with a certificate to one or more specified thing groups, typically for quarantine.
                    replaceDefaultPolicyVersionParams:
                      allOf:
                      - $ref: '#/components/schemas/ReplaceDefaultPolicyVersionParams'
                      - description: Parameters to define a mitigation action that adds a blank policy to restrict permissions.
                    enableIoTLoggingParams:
                      allOf:
                      - $ref: '#/components/schemas/EnableIoTLoggingParams'
                      - description: Parameters to define a mitigation action that enables Amazon Web Services IoT Core logging at a specified level of detail.
                    publishFindingToSnsParams:
                      allOf:
                      - $ref: '#/components/schemas/PublishFindingToSnsParams'
                      - description: Parameters to define a mitigation action that publishes findings to Amazon Simple Notification Service (Amazon SNS. You can implement your own custom actions in response to the Amazon SNS messages.
                tags:
                  description: Metadata that can be used to manage the mitigation action.
                  type: array
                  items:
                    $ref: '#/components/schemas/Tag'
      summary: Amazon IoT Core Create Mitigation Action
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - Mitigationactions
    delete:
      operationId: DeleteMitigationAction
      description: <p>Deletes a defined mitigation action from your Amazon Web Services accounts.</p> <p>Requires permission to access the <a href="https://docs.aws.amazon.com/service-authorization/latest/reference/list_awsiot.html#awsiot-actions-as-permissions">DeleteMitigationAction</a> action.</p>
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteMitigationActionResponse'
        '480':
          description: InvalidRequestException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidRequestException'
        '481':
          description: ThrottlingException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThrottlingException'
        '482':
          description: InternalFailureException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalFailureException'
      parameters:
      - name: actionName
        in: path
        required: true
        description: The name of the mitigation action that you want to delete.
        schema:
          type: string
          pattern: '[a-zA-Z0-9_-]+'
          maxLength: 128
      summary: Amazon IoT Core Delete Mitigation Action
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - Mitigationactions
    get:
      operationId: DescribeMitigationAction
      description: <p>Gets information about a mitigation action.</p> <p>Requires permission to access the <a href="https://docs.aws.amazon.com/service-authorization/latest/reference/list_awsiot.html#awsiot-actions-as-permissions">DescribeMitigationAction</a> action.</p>
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescribeMitigationActionResponse'
        '480':
          description: InvalidRequestException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidRequestException'
        '481':
          description: ResourceNotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceNotFoundException'
        '482':
          description: ThrottlingException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThrottlingException'
        '483':
          description: InternalFailureException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalFailureException'
      parameters:
      - name: actionName
        in: path
        required: true
        description: The friendly name that uniquely identifies the mitigation action.
        schema:
          type: string
          pattern: '[a-zA-Z0-9_-]+'
          maxLength: 128
      summary: Amazon IoT Core Describe Mitigation Action
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - Mitigationactions
    patch:
      operationId: UpdateMitigationAction
      description: <p>Updates the definition for the specified mitigation action.</p> <p>Requires permission to access the <a href="https://docs.aws.amazon.com/service-authorization/latest/reference/list_awsiot.html#awsiot-actions-as-permissions">UpdateMitigationAction</a> action.</p>
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateMitigationActionResponse'
        '480':
          description: InvalidRequestException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidRequestException'
        '481':
          description: ResourceNotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceNotFoundException'
        '482':
          description: ThrottlingException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThrottlingException'
        '483':
          description: InternalFailureException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalFailureException'
      parameters:
      - name: actionName
        in: path
        required: true
        description: The friendly name for the mitigation action. You cannot change the name by using <code>UpdateMitigationAction</code>. Instead, you must delete and recreate the mitigation action with the new name.
        schema:
          type: string
          pattern: '[a-zA-Z0-9_-]+'
          maxLength: 128
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                roleArn:
                  description: The ARN of the IAM role that is used to apply the mitigation action.
                  type: string
                  minLength: 20
                  maxLength: 2048
                actionParams:
                  description: The set of parameters for this mitigation action. You can specify only one type of parameter (in other words, you can apply only one action for each defined mitigation action).
                  type: object
                  properties:
                    updateDeviceCertificateParams:
                      allOf:
                      - $ref: '#/components/schemas/UpdateDeviceCertificateParams'
                      - description: Parameters to define a mitigation action that changes the state of the device certificate to inactive.
                    updateCACertificateParams:
                      allOf:
                      - $ref: '#/components/schemas/UpdateCACertificateParams'
                      - description: Parameters to define a mitigation action that changes the state of the CA certificate to inactive.
                    addThingsToThingGroupParams:
                      allOf:
                      - $ref: '#/components/schemas/AddThingsToThingGroupParams'
                      - description: Parameters to define a mitigation action that moves devices associated with a certificate to one or more specified thing groups, typically for quarantine.
                    replaceDefaultPolicyVersionParams:
                      allOf:
                      - $ref: '#/components/schemas/ReplaceDefaultPolicyVersionParams'
                      - description: Parameters to define a mitigation action that adds a blank policy to restrict permissions.
                    enableIoTLoggingParams:
                      allOf:
                      - $ref: '#/components/schemas/EnableIoTLoggingParams'
                      - description: Parameters to define a mitigation action that enables Amazon Web Services IoT Core logging at a specified level of detail.
                    publishFindingToSnsParams:
                      allOf:
                      - $ref: '#/components/schemas/PublishFindingToSnsParams'
                      - description: Parameters to define a mitigation action that publishes findings to Amazon Simple Notification Service (Amazon SNS. You can implement your own custom actions in response to the Amazon SNS messages.
      summary: Amazon IoT Core Update Mitigation Action
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - Mitigationactions
  /mitigationactions/actions:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    get:
      operationId: ListMitigationActions
      description: <p>Gets a list of all mitigation actions that match the specified filter criteria.</p> <p>Requires permission to access the <a href="https://docs.aws.amazon.com/service-authorization/latest/reference/list_awsiot.html#awsiot-actions-as-permissions">ListMitigationActions</a> action.</p>
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMitigationActionsResponse'
        '480':
          description: InvalidRequestException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidRequestException'
        '481':
          description: ThrottlingException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThrottlingException'
        '482':
          description: InternalFailureException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalFailureException'
      parameters:
      - name: actionType
        in: query
        required: false
        description: Specify a value to limit the result to mitigation actions with a specific action type.
        schema:
          type: string
          enum:
          - UPDATE_DEVICE_CERTIFICATE
          - UPDATE_CA_CERTIFICATE
          - ADD_THINGS_TO_THING_GROUP
          - REPLACE_DEFAULT_POLICY_VERSION
          - ENABLE_IOT_LOGGING
          - PUBLISH_FINDING_TO_SNS
      - name: maxResults
        in: query
        required: false
        description: The maximum number of results to return at one time. The default is 25.
        schema:
          type: integer
          minimum: 1
          maximum: 250
      - name: nextToken
        in: query
        required: false
        description: The token for the next set of results.
        schema:
          type: string
      summary: Amazon IoT Core List Mitigation Actions
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - Mitigationactions
components:
  schemas:
    UpdateCACertificateParams:
      type: object
      required:
      - action
      properties:
        action:
          allOf:
          - $ref: '#/components/schemas/CACertificateUpdateAction'
          - description: The action that you want to apply to the CA certificate. The only supported value is <code>DEACTIVATE</code>.
      description: Parameters to define a mitigation action that changes the state of the CA certificate to inactive.
    ResourceNotFoundException: {}
    MitigationActionIdentifier:
      type: object
      properties:
        actionName:
          allOf:
          - $ref: '#/components/schemas/MitigationActionName'
          - description: The friendly name of the mitigation action.
        actionArn:
          allOf:
          - $ref: '#/components/schemas/MitigationActionArn'
          - description: The IAM role ARN used to apply this mitigation action.
        creationDate:
          allOf:
          - $ref: '#/components/schemas/Timestamp'
          - description: The date when this mitigation action was created.
      description: Information that identifies a mitigation action. This information is returned by ListMitigationActions.
    DescribeMitigationActionResponse:
      type: object
      properties:
        actionName:
          allOf:
          - $ref: '#/components/schemas/MitigationActionName'
          - description: The friendly name that uniquely identifies the mitigation action.
        actionType:
          allOf:
          - $ref: '#/components/schemas/MitigationActionType'
          - description: The type of mitigation action.
        actionArn:
          allOf:
          - $ref: '#/components/schemas/MitigationActionArn'
          - description: The ARN that identifies this migration action.
        actionId:
          allOf:
          - $ref: '#/components/schemas/MitigationActionId'
          - description: A unique identifier for this action.
        roleArn:
          allOf:
          - $ref: '#/components/schemas/RoleArn'
          - description: The ARN of the IAM role used to apply this action.
        actionParams:
          allOf:
          - $ref: '#/components/schemas/MitigationActionParams'
          - description: Parameters that control how the mitigation action is applied, specific to the type of mitigation action.
        creationDate:
          allOf:
          - $ref: '#/components/schemas/Timestamp'
          - description: The date and time when the mitigation action was added to your Amazon Web Services accounts.
        lastModifiedDate:
          allOf:
          - $ref: '#/components/schemas/Timestamp'
          - description: The date and time when the mitigation action was last changed.
    TagKey:
      type: string
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
      minLength: 1
      maxLength: 128
    ThrottlingException: {}
    EnableIoTLoggingParams:
      type: object
      required:
      - roleArnForLogging
      - logLevel
      properties:
        roleArnForLogging:
          allOf:
          - $ref: '#/components/schemas/RoleArn'
          - description: The Amazon Resource Name (ARN) of the IAM role used for logging.
        logLevel:
          allOf:
          - $ref: '#/components/schemas/LogLevel'
          - description: Specifies the type of information to be logged.
      description: Parameters used when defining a mitigation action that enable Amazon Web Services IoT Core logging.
    MitigationActionIdentifierList:
      type: array
      items:
        $ref: '#/components/schemas/MitigationActionIdentifier'
    InvalidRequestException: {}
    UpdateMitigationActionResponse:
      type: object
      properties:
        actionArn:
          allOf:
          - $ref: '#/components/schemas/MitigationActionArn'
          - description: The ARN for the new mitigation action.
        actionId:
          allOf:
          - $ref: '#/components/schemas/MitigationActionId'
          - description: A unique identifier for the mitigation action.
    DeleteMitigationActionResponse:
      type: object
      properties: {}
    ThingGroupName:
      type: string
      pattern: '[a-zA-Z0-9:_-]+'
      minLength: 1
      maxLength: 128
    InternalFailureException: {}
    LimitExceededException: {}
    NextToken:
      type: string
    MitigationActionType:
      type: string
      enum:
      - UPDATE_DEVICE_CERTIFICATE
      - UPDATE_CA_CERTIFICATE
      - ADD_THINGS_TO_THING_GROUP
      - REPLACE_DEFAULT_POLICY_VERSION
      - ENABLE_IOT_LOGGING
      - PUBLISH_FINDING_TO_SNS
    CACertificateUpdateAction:
      type: string
      enum:
      - DEACTIVATE
    MitigationActionArn:
      type: string
    MitigationActionName:
      type: string
      pattern: '[a-zA-Z0-9_-]+'
      maxLength: 128
    RoleArn:
      type: string
      minLength: 20
      maxLength: 2048
    AddThingsToThingGroupParams:
      type: object
      required:
      - thingGroupNames
      properties:
        thingGroupNames:
          allOf:
          - $ref: '#/components/schemas/ThingGroupNames'
          - description: The list of groups to which you want to add the things that triggered the mitigation action. You can add a thing to a maximum of 10 groups, but you can't add a thing to more than one group in the same hierarchy.
        overrideDynamicGroups:
          allOf:
          - $ref: '#/components/schemas/NullableBoolean'
          - description: Specifies if this mitigation action can move the things that triggered the mitigation action even if they are part of one or more dynamic thing groups.
      description: Parameters used when defining a mitigation action that move a set of things to a thing group.
    UpdateDeviceCertificateParams:
      type: object
      required:
      - action
      properties:
        action:
          allOf:
          - $ref: '#/components/schemas/DeviceCertificateUpdateAction'
          - description: The action that you want to apply to the device certificate. The only supported value is <code>DEACTIVATE</code>.
      description: Parameters to define a mitigation action that changes the state of the device certificate to inactive.
    Tag:
      type: object
      required:
      - Key
      properties:
        Key:
          allOf:
          - $ref: '#/components/schemas/TagKey'
          - description: The tag's key.
        Value:
          allOf:
          - $ref: '#/components/schemas/TagValue'
          - description: The tag's value.
      description: A set of key/value pairs that are used to manage the resource.
    NullableBoolean:
      type: boolean
    ResourceAlreadyExistsException: {}
    SnsTopicArn:
      type: string
      maxLength: 350
    PublishFindingToSnsParams:
      type: object
      required:
      - topicArn
      properties:
        topicArn:
          allOf:
          - $ref: '#/components/schemas/SnsTopicArn'
          - description: The ARN of the topic to which you want to publish the findings.
      description: Parameters to define a mitigation action that publishes findings to Amazon SNS. You can implement your own custom actions in response to the Amazon SNS messages.
    ReplaceDefaultPolicyVersionParams:
      type: object
      required:
      - templateName
      properties:
        templateName:
          allOf:
          - $ref: '#/components/schemas/PolicyTemplateName'
          - description: The name of the template to be applied. The only supported value is <code>BLANK_POLICY</code>.
      description: Parameters to define a mitigation action that adds a blank policy to restrict permissions.
    CreateMitigationActionResponse:
      type: object
      properties:
        actionArn:
          allOf:
          - $ref: '#/components/schemas/MitigationActionArn'
          - description: The ARN for the new mitigation action.
        actionId:
          allOf:
          - $ref: '#/components/schemas/MitigationActionId'
          - description: A unique identifier for the new mitigation action.
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
    MitigationActionParams:
      type: object
      properties:
        updateDeviceCertificateParams:
          allOf:
          - $ref: '#/components/schemas/UpdateDeviceCertificateParams'
          - description: Parameters to define a mitigation action that changes the state of the device certificate to inactive.
        updateCACertificateParams:
          allOf:
          - $ref: '#/components/schemas/UpdateCACertificateParams'
          - description: Parameters to define a mitigation action that changes the state of the CA certificate to inactive.
        addThingsToThingGroupParams:
          allOf:
          - $ref: '#/components/schemas/AddThingsToThingGroupParams'
          - description: Parameters to define a mitigation action that moves devices associated with a certificate to one or more specified thing groups, typically for quarantine.
        replaceDefaultPolicyVersionParams:
          allOf:
          - $ref: '#/components/schemas/ReplaceDefaultPolicyVersionParams'
          - description: Parameters to define a mitigation action that adds a blank policy to restrict permissions.
        enableIoTLoggingParams:
          allOf:
          - $ref: '#/components/schemas/EnableIoTLoggingParams'
          - description: Parameters to define a mitigation action that enables Amazon Web Services IoT Core logging at a specified level of detail.
        publishFindingToSnsParams:
