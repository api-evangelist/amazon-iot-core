        schema:
          type: string
          pattern: '[a-zA-Z0-9_\-\.]+'
          minLength: 1
          maxLength: 128
      - name: expectedVersion
        in: query
        required: false
        description: The expected version of the fleet metric to delete.
        schema:
          type: integer
      summary: Amazon IoT Core Delete Fleet Metric
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - Fleet Metric
    get:
      operationId: DescribeFleetMetric
      description: <p>Gets information about the specified fleet metric.</p> <p>Requires permission to access the <a href="https://docs.aws.amazon.com/service-authorization/latest/reference/list_awsiot.html#awsiot-actions-as-permissions">DescribeFleetMetric</a> action.</p>
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescribeFleetMetricResponse'
        '480':
          description: InvalidRequestException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidRequestException'
        '481':
          description: ThrottlingException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThrottlingException'
        '482':
          description: UnauthorizedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedException'
        '483':
          description: ServiceUnavailableException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceUnavailableException'
        '484':
          description: InternalFailureException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalFailureException'
        '485':
          description: ResourceNotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceNotFoundException'
      parameters:
      - name: metricName
        in: path
        required: true
        description: The name of the fleet metric to describe.
        schema:
          type: string
          pattern: '[a-zA-Z0-9_\-\.]+'
          minLength: 1
          maxLength: 128
      summary: Amazon IoT Core Describe Fleet Metric
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - Fleet Metric
    patch:
      operationId: UpdateFleetMetric
      description: <p>Updates the data for a fleet metric.</p> <p>Requires permission to access the <a href="https://docs.aws.amazon.com/service-authorization/latest/reference/list_awsiot.html#awsiot-actions-as-permissions">UpdateFleetMetric</a> action.</p>
      responses:
        '200':
          description: Success
        '480':
          description: InvalidRequestException
          content:
