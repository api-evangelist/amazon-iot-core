    UnauthorizedException: {}
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
    FleetMetricName:
      type: string
      pattern: '[a-zA-Z0-9_\-\.]+'
      minLength: 1
      maxLength: 128
