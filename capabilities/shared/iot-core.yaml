naftiko: "1.0.0-alpha1"
info:
  label: Amazon IoT Core API
  description: Managed cloud service for IoT device connectivity and message routing.
  tags:
    - IoT
    - AWS
    - Device Management
    - MQTT
    - Message Routing
  created: "2026-04-19"
  modified: "2026-04-19"
binds:
  - namespace: env
    keys:
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
capability:
  consumes:
    - type: http
      namespace: iot-core
      baseUri: https://iot.amazonaws.com
      description: Amazon IoT Core REST API
      authentication:
        type: apikey
        key: Authorization
        value: "{{AWS_ACCESS_KEY_ID}}"
        placement: header
      resources:
        - name: resources
          path: /
          description: Amazon IoT Core resources
          operations:
            - name: list-things
              method: GET
              description: List Things
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
  exposes:
    - type: rest
      port: 8100
      namespace: iot-core-rest
      resources:
        - path: /v1/resources
          name: resources
          description: Amazon IoT Core resources
          operations:
            - method: GET
              name: list-things
              description: List Things
              call: "iot-core.list-things"
              outputParameters:
                - type: object
                  mapping: "$."
    - type: mcp
      port: 9100
      namespace: iot-core-mcp
      transport: http
      tools:
        - name: list-things
          description: Amazon IoT Core List Things
          hints:
            readOnly: true
            openWorld: true
          call: "iot-core.list-things"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-thing
          description: Amazon IoT Core Create Thing
          hints:
            readOnly: false
            
          call: "iot-core.create-thing"
          outputParameters:
            - type: object
              mapping: "$."

        - name: delete-thing
          description: Amazon IoT Core Delete Thing
          hints:
            readOnly: false
            
          call: "iot-core.delete-thing"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-thing
          description: Amazon IoT Core Get Thing
          hints:
            readOnly: true
            openWorld: true
          call: "iot-core.get-thing"
          outputParameters:
            - type: object
              mapping: "$."

        - name: attach-policy
          description: Amazon IoT Core Attach Policy
          hints:
            readOnly: false
            
          call: "iot-core.attach-policy"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-policy
          description: Amazon IoT Core Create Policy
          hints:
            readOnly: false
            
          call: "iot-core.create-policy"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-rules
          description: Amazon IoT Core List Rules
          hints:
            readOnly: true
            openWorld: true
          call: "iot-core.list-rules"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-topic-rule
          description: Amazon IoT Core Create Topic Rule
          hints:
            readOnly: false
            
          call: "iot-core.create-topic-rule"
          outputParameters:
            - type: object
              mapping: "$."
