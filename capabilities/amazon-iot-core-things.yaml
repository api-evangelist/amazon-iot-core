naftiko: 1.0.0-alpha2
info:
  label: Amazon IoT Core API — Things
  description: 'Amazon IoT Core API — Things. 4 operations. Lead operation: Amazon IoT Core List IoT things. Self-contained
    Naftiko capability covering one Amazon Iot Core business surface.'
  tags:
  - Amazon Iot Core
  - Things
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_IOT_CORE_API_KEY: AMAZON_IOT_CORE_API_KEY
capability:
  consumes:
  - type: http
    namespace: amazon-iot-core-things
    baseUri: https://iot.{region}.amazonaws.com
    description: Amazon IoT Core API — Things business capability. Self-contained, no shared references.
    resources:
    - name: things
      path: /things
      operations:
      - name: listthings
        method: GET
        description: Amazon IoT Core List IoT things
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: maxResults
          in: query
          type: integer
        - name: nextToken
          in: query
          type: string
    - name: things-thingName
      path: /things/{thingName}
      operations:
      - name: describething
        method: GET
        description: Amazon IoT Core Describe a thing
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: thingName
          in: path
          type: string
          required: true
      - name: creatething
        method: PUT
        description: Amazon IoT Core Create a thing
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: thingName
          in: path
          type: string
          required: true
      - name: deletething
        method: DELETE
        description: Amazon IoT Core Delete a thing
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: thingName
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.AMAZON_IOT_CORE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: amazon-iot-core-things-rest
    port: 8080
    description: REST adapter for Amazon IoT Core API — Things. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/things
      name: things
      description: REST surface for things.
      operations:
      - method: GET
        name: listthings
        description: Amazon IoT Core List IoT things
        call: amazon-iot-core-things.listthings
        with:
          maxResults: rest.maxResults
          nextToken: rest.nextToken
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/things/{thingname}
      name: things-thingname
      description: REST surface for things-thingName.
      operations:
      - method: GET
        name: describething
        description: Amazon IoT Core Describe a thing
        call: amazon-iot-core-things.describething
        with:
          thingName: rest.thingName
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: creatething
        description: Amazon IoT Core Create a thing
        call: amazon-iot-core-things.creatething
        with:
          thingName: rest.thingName
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletething
        description: Amazon IoT Core Delete a thing
        call: amazon-iot-core-things.deletething
        with:
          thingName: rest.thingName
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: amazon-iot-core-things-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon IoT Core API — Things. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: amazon-iot-core-list-iot
      description: Amazon IoT Core List IoT things
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: amazon-iot-core-things.listthings
      with:
        maxResults: tools.maxResults
        nextToken: tools.nextToken
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-iot-core-describe-thing
      description: Amazon IoT Core Describe a thing
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: amazon-iot-core-things.describething
      with:
        thingName: tools.thingName
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-iot-core-create-thing
      description: Amazon IoT Core Create a thing
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: amazon-iot-core-things.creatething
      with:
        thingName: tools.thingName
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-iot-core-delete-thing
      description: Amazon IoT Core Delete a thing
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: amazon-iot-core-things.deletething
      with:
        thingName: tools.thingName
      outputParameters:
      - type: object
        mapping: $.
