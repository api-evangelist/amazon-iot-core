naftiko: 1.0.0-alpha2
info:
  label: Amazon IoT Core API — Jobs
  description: 'Amazon IoT Core API — Jobs. 1 operations. Lead operation: Amazon IoT Core List jobs. Self-contained Naftiko
    capability covering one Amazon Iot Core business surface.'
  tags:
  - Amazon Iot Core
  - Jobs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_IOT_CORE_API_KEY: AMAZON_IOT_CORE_API_KEY
capability:
  consumes:
  - type: http
    namespace: amazon-iot-core-jobs
    baseUri: https://iot.{region}.amazonaws.com
    description: Amazon IoT Core API — Jobs business capability. Self-contained, no shared references.
    resources:
    - name: jobs
      path: /jobs
      operations:
      - name: listjobs
        method: GET
        description: Amazon IoT Core List jobs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.AMAZON_IOT_CORE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: amazon-iot-core-jobs-rest
    port: 8080
    description: REST adapter for Amazon IoT Core API — Jobs. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/jobs
      name: jobs
      description: REST surface for jobs.
      operations:
      - method: GET
        name: listjobs
        description: Amazon IoT Core List jobs
        call: amazon-iot-core-jobs.listjobs
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: amazon-iot-core-jobs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon IoT Core API — Jobs. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: amazon-iot-core-list-jobs
      description: Amazon IoT Core List jobs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: amazon-iot-core-jobs.listjobs
      outputParameters:
      - type: object
        mapping: $.
