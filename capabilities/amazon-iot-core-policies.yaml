naftiko: 1.0.0-alpha2
info:
  label: Amazon IoT Core API — Policies
  description: 'Amazon IoT Core API — Policies. 1 operations. Lead operation: Amazon IoT Core List IoT policies. Self-contained
    Naftiko capability covering one Amazon Iot Core business surface.'
  tags:
  - Amazon Iot Core
  - Policies
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_IOT_CORE_API_KEY: AMAZON_IOT_CORE_API_KEY
capability:
  consumes:
  - type: http
    namespace: amazon-iot-core-policies
    baseUri: https://iot.{region}.amazonaws.com
    description: Amazon IoT Core API — Policies business capability. Self-contained, no shared references.
    resources:
    - name: policies
      path: /policies
      operations:
      - name: listpolicies
        method: GET
        description: Amazon IoT Core List IoT policies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.AMAZON_IOT_CORE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: amazon-iot-core-policies-rest
    port: 8080
    description: REST adapter for Amazon IoT Core API — Policies. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/policies
      name: policies
      description: REST surface for policies.
      operations:
      - method: GET
        name: listpolicies
        description: Amazon IoT Core List IoT policies
        call: amazon-iot-core-policies.listpolicies
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: amazon-iot-core-policies-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon IoT Core API — Policies. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: amazon-iot-core-list-iot
      description: Amazon IoT Core List IoT policies
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: amazon-iot-core-policies.listpolicies
      outputParameters:
      - type: object
        mapping: $.
