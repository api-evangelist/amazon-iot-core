input MitigationActionParamsInput {
  updateDeviceCertificateParams: UpdateDeviceCertificateParamsInput
  addThingsToThingGroupParams: AddThingsToThingGroupParamsInput
  replaceDefaultPolicyVersionParams: ReplaceDefaultPolicyVersionParamsInput
  enableIoTLoggingParams: EnableIoTLoggingParamsInput
  publishFindingToSnsParams: PublishFindingToSnsParamsInput
}

input UpdateDeviceCertificateParamsInput {
  action: String!
}

input AddThingsToThingGroupParamsInput {
  thingGroupNames: [String!]!
  overrideDynamicGroups: Boolean
}

input ReplaceDefaultPolicyVersionParamsInput {
  templateName: String!
