input EnableIoTLoggingParamsInput {
  roleArnForLogging: String!
  logLevel: String!
}

input PublishFindingToSnsParamsInput {
  topicArn: String!
}

# ─── List / Connection Types ──────────────────────────────────────────────────

type ThingList {
  things: [Thing]
  nextToken: String
}

type ThingTypeList {
  thingTypes: [ThingType]
  nextToken: String
}

type ThingGroupList {
  thingGroups: [GroupNameAndArn]
  nextToken: String
}

type CertificateList {
  certificates: [Certificate]
  nextMarker: String
}

type PolicyList {
  policies: [Policy]
  nextMarker: String
}

type PolicyVersionList {
  policyVersions: [PolicyVersion]
}

type NamedShadowList {
  results: [String]
  nextToken: String
  timestamp: AWSTimestamp
}

type TopicRuleList {
  rules: [TopicRuleListItem]
  nextToken: String
}

type TopicRuleListItem {
  ruleArn: String
  ruleName: String
  topicPattern: String
  createdAt: AWSDateTime
  ruleDisabled: Boolean
}

type TopicRuleDestinationList {
  destinationSummaries: [TopicRuleDestination]
  nextToken: String
}

type JobList {
  jobs: [Job]
  nextToken: String
}

type JobExecutionList {
  executionSummaries: [JobExecution]
  nextToken: String
}

type FleetList {
  fleetMetrics: [Fleet]
  nextToken: String
}

type SearchIndexResult {
  nextToken: String
  things: [IndexSearch]
  thingGroups: [ThingGroup]
}

type AuthorizerList {
  authorizers: [Authorizer]
  nextMarker: String
}

type SecurityProfileList {
  securityProfileIdentifiers: [SecurityProfile]
  nextToken: String
}

type AuditTaskList {
  tasks: [Audit]
  nextToken: String
}

type AuditFindingList {
  findings: [AuditFinding]
  nextToken: String
}

type MitigationActionList {
  actionIdentifiers: [MitigationAction]
