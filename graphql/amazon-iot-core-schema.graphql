input ThingAttributeInput {
  key: String!
  value: String
}

input TopicRulePayloadInput {
  sql: String!
  description: String
  actions: [RuleActionInput!]!
  ruleDisabled: Boolean
  awsIotSqlVersion: String
  errorAction: RuleActionInput
}

input RuleActionInput {
  sns: SNSActionInput
  sqs: SQSActionInput
  dynamoDB: DynamoDBActionInput
  lambda: LambdaActionInput
  s3: S3ActionInput
  iotAnalytics: IoTAnalyticsActionInput
}

input SNSActionInput {
  targetArn: String!
  roleArn: String!
  messageFormat: String
}

input SQSActionInput {
  queueUrl: String!
  roleArn: String!
  useBase64: Boolean
}

input DynamoDBActionInput {
  tableName: String!
  roleArn: String!
  hashKeyField: String
  hashKeyValue: String
  rangeKeyField: String
  rangeKeyValue: String
}

input LambdaActionInput {
  functionArn: String!
}

input S3ActionInput {
  bucketName: String!
  key: String!
  roleArn: String!
}

input IoTAnalyticsActionInput {
  channelName: String
  roleArn: String
  batchMode: Boolean
}

input AggregationTypeInput {
  name: String!
  values: [String]
}

input BehaviorInput {
  name: String!
  metric: String
  criteria: BehaviorCriteriaInput
}

input BehaviorCriteriaInput {
  comparisonOperator: String
  durationSeconds: Int
  consecutiveDatapointsToAlarm: Int
  consecutiveDatapointsToClear: Int
